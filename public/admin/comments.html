<style>
  .cm-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .cm-sort { display: flex; gap: 6px; }
  .cm-sort-btn {
    padding: 7px 14px; font-size: 12.5px; border: 1px solid var(--admin-border);
    background: transparent; color: var(--muted); border-radius: 999px; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .cm-sort-btn:hover { color: var(--fg); }
  .cm-sort-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .cm-search {
    flex: 1; min-width: 180px; max-width: 320px;
    padding: 8px 13px; font-size: 13px; font-family: inherit; color: var(--fg);
    background: transparent; border: 1px solid var(--admin-border); border-radius: 8px;
  }
  .cm-search:focus { outline: none; border-color: var(--fg); }
  .cm-count { font-size: 12.5px; color: var(--muted); margin-left: auto; }
  .cm-topic { font-size: 12.5px; }
  .cm-text {
    font-size: 13px; color: var(--fg); line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; max-width: 460px;
  }
  .cm-author { font-size: 12.5px; white-space: nowrap; }
  .cm-likes { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .cm-date { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .cm-del {
    background: none; border: 1px solid var(--admin-border); border-radius: 7px;
    font-size: 11.5px; color: var(--muted); cursor: pointer; padding: 5px 10px; font-family: inherit;
    transition: all .15s; white-space: nowrap;
  }
  .cm-del:hover { color: #dc2626; border-color: #dc2626; }
</style>
</head>

        <a href="/admin/drafts.html"><i class="fa-regular fa-file-lines"></i> 임시저장</a>

        <a href="/admin/upcoming.html"><i class="fa-regular fa-clock"></i> Up Coming</a>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/assets/js/firebase.js"></script>
<script src="/admin/assets/js/admin.js"></script>
<script>
  (function syncLogos() {
    const dark = document.body.classList.contains('dark');
    document.querySelectorAll('.brand-logo-light').forEach(l => l.style.display = dark ? 'none' : 'inline-block');
    document.querySelectorAll('.brand-logo-dark').forEach(l => l.style.display = dark ? 'inline-block' : 'none');
  })();

  const tbody = document.getElementById('cmBody');
  const countEl = document.getElementById('cmCount');
  const searchEl = document.getElementById('cmSearch');

  let allComments = [];     // [{ id, topicId, data }]
  const topicTitles = {};   // topicId -> title
  let sortMode = 'recent';  // recent | likes
  let searchQ = '';

  function tsMs(ts) {
    if (ts && typeof ts.toDate === 'function') return ts.toDate().getTime();
    if (ts) { const t = new Date(ts).getTime(); return isNaN(t) ? 0 : t; }
    return 0;
  }
  function fmtDate(ts) {
    const ms = tsMs(ts);
    if (!ms) return '';
    const d = new Date(ms);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function render() {
    let list = allComments.slice();
    if (searchQ) {
      const q = searchQ.toLowerCase();
      list = list.filter(c =>
        (c.data.text || '').toLowerCase().includes(q) ||
        (c.data.userName || '').toLowerCase().includes(q));
    }
    if (sortMode === 'likes') {
      list.sort((a, b) => (b.data.likeCount || 0) - (a.data.likeCount || 0) || tsMs(b.data.createdAt) - tsMs(a.data.createdAt));
    } else {
      list.sort((a, b) => tsMs(b.data.createdAt) - tsMs(a.data.createdAt));
    }
    countEl.textContent = '전체 ' + fmtNum(allComments.length) + '개' + (searchQ ? ` · 검색 ${fmtNum(list.length)}개` : '');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);">' + (searchQ ? '검색 결과가 없습니다.' : '아직 댓글이 없습니다.') + '</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(c => {
      const title = topicTitles[c.topicId] || '(삭제된 오피니언)';
      const href = '/opinion.html?id=' + encodeURIComponent(c.topicId);
      const likes = c.data.likeCount || 0;
      return `
        <tr>
          <td class="cm-topic"><a href="${href}" target="_blank" class="title-cell">${adminEscHTML(title)}</a></td>
          <td class="cm-author">${adminEscHTML(c.data.userName || '독자')}</td>
          <td class="cm-text">${adminEscHTML(c.data.text || '')}</td>
          <td class="cm-likes">${likes > 0 ? '<i class="fa-solid fa-thumbs-up" style="color:#2563eb;margin-right:5px;"></i>' + fmtNum(likes) : '—'}</td>
          <td class="cm-date">${fmtDate(c.data.createdAt)}</td>
          <td><button class="cm-del" data-id="${adminEscHTML(c.id)}" data-topic="${adminEscHTML(c.topicId)}">삭제</button></td>
        </tr>`;
    }).join('');
  }

  async function delComment(topicId, cid) {
    if (!topicId || !cid) return;
    if (!(await sysConfirm('이 댓글을 삭제할까요?\n삭제하면 되돌릴 수 없습니다.', { danger: true, okLabel: '삭제' }))) return;
    try {
      await fb.db.collection('opinions').doc(topicId).collection('comments').doc(cid).delete();
      try {
        await fb.db.collection('opinions').doc(topicId).update({ commentCount: fb.FieldValue.increment(-1) });
      } catch (_) { /* 토픽이 없거나 권한 외 — 무시 */ }
      if (typeof showToast === 'function') showToast('댓글을 삭제했습니다.');
    } catch (err) {
      if (typeof sysAlert === 'function') sysAlert('삭제 실패: ' + err.message);
      else alert('삭제 실패: ' + err.message);
    }
  }

  // 정렬 버튼
  document.querySelectorAll('.cm-sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cm-sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortMode = btn.getAttribute('data-sort');
      render();
    });
  });
  // 검색
  searchEl.addEventListener('input', () => { searchQ = searchEl.value.trim(); render(); });
  // 삭제 위임
  tbody.addEventListener('click', e => {
    const del = e.target.closest('.cm-del');
    if (del) delComment(del.getAttribute('data-topic'), del.getAttribute('data-id'));
  });

  fb.authReady.then(user => {
    if (!user || !fb.isAdmin()) return;
    // 오피니언 제목 매핑
    fb.db.collection('opinions').get()
      .then(snap => { snap.forEach(d => { topicTitles[d.id] = d.data().title || '(제목 없음)'; }); render(); })
      .catch(err => console.warn('[comments] 오피니언 제목 로드 실패:', err.message));
    // 전체 댓글 실시간 구독 (collectionGroup — 정렬 없이 받아 클라이언트 정렬 → 인덱스 불필요)
    fb.db.collectionGroup('comments').onSnapshot(snap => {
      allComments = snap.docs.map(d => ({
        id: d.id,
        topicId: (d.ref.parent && d.ref.parent.parent) ? d.ref.parent.parent.id : '',
        data: d.data()
      }));
      render();
    }, err => {
      console.warn('[comments] 구독 실패:', err.message);
      tbody.innerHTML = '<tr><td colspan="6" style="color:#dc2626;">불러오기 실패: ' + adminEscHTML(err.message) + '</td></tr>';
    });
  });
</script>
</body>
</html>
