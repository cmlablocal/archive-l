        <div class="admin-stat-value">—</div>
      </div>
      <div class="admin-stat" id="statTotalArticles">
        <div class="admin-stat-label">총 발행 콘텐츠</div>
        <div class="admin-stat-value">—</div>
      </div>
      <div class="admin-stat" id="statTotalLikes">
        <div class="admin-stat-label">총 좋아요</div>
        <div class="admin-stat-value">—</div>

    </section>

    <h2 style="font-size:14px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:32px 0 14px;">글별 참여도</h2>

      <button class="admin-btn ghost admin-btn-sm sort-btn active" data-sort="views">조회 많은 순</button>

            <th style="width:100px; text-align:right;"><i class="fa-regular fa-heart"></i> 좋아요</th>
          </tr>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/assets/js/firebase.js"></script>
<script src="/admin/assets/js/admin.js"></script>
<script src="/assets/js/data.js"></script>
<script>
  (function syncLogos() {
    const dark = document.body.classList.contains('dark');
    document.querySelectorAll('.brand-logo-light').forEach(l => l.style.display = dark ? 'none' : 'inline-block');
    document.querySelectorAll('.brand-logo-dark').forEach(l => l.style.display = dark ? 'inline-block' : 'none');
  })();
  document.getElementById('adminWho').textContent = adminEmail();

  // ===== State =====
  let articlesList = [];   // Firestore articles
  let usersList = [];      // Firestore users
  let sortMode = 'views';  // 'views' | 'likes'
  let articlesReady = false;
  let usersReady = false;

  // Helper — reaction counts (supports either reactionCounts.{new,deep,pass} or reactions{*-new,*-deep,*-pass})
  // 좋아요 수. 현재 공개 사이트는 rcNew 필드를 ±1 한다.
  // 예전 데이터가 reactionCounts.new 나 reactions 맵에 들어간 경우도 함께 더한다.
  function likeCount(a) {
    let n = Number(a.rcNew || 0);
    const rc = a.reactionCounts || {};
    n += Number(rc.new || 0);
    const r = a.reactions;
    if (r && typeof r === 'object') {
      Object.entries(r).forEach(([k, v]) => {
        if (k.endsWith('-new')) n += Number(v) || 0;
      });
    }
    return n > 0 ? n : 0;
  }

  function render() {
    // ===== Top stat cards =====
    const totalUsers = usersList.length;
    const weekAgo = Date.now() - 7 * 86400 * 1000;
    const recentUsers = usersList.filter(u => {
      const c = u.createdAt;
      let t = 0;
      if (c && typeof c.toDate === 'function') t = c.toDate().getTime();
      else if (c && typeof c.seconds === 'number') t = c.seconds * 1000;
      else if (typeof c === 'string') t = new Date(c).getTime() || 0;
      else if (typeof c === 'number') t = c;
      return t >= weekAgo;
    }).length;

    const pubArticles = articlesList.filter(a => a.status === 'PUBLISHED');
    const legacyEntries = Object.entries(window.ARTICLES || {});
    const totalArticles = pubArticles.length + legacyEntries.length;
    const totalLikes = pubArticles.reduce((s, a) => s + likeCount(a), 0);

    const setVal = (id, v) => {
      const el = document.querySelector(`#${id} .admin-stat-value`);
      if (el) el.textContent = typeof v === 'number' ? fmtNum(v) : v;
    };
    // Until both subscriptions arrive, show '—' for the side that isn't loaded
    setVal('statTotalUsers', usersReady ? totalUsers : '—');
    setVal('statRecentUsers', usersReady ? recentUsers : '—');
    setVal('statTotalArticles', articlesReady ? totalArticles : '—');
    setVal('statTotalLikes', articlesReady ? totalLikes : '—');

    // ===== Engagement table =====
    const rows = [
      ...pubArticles.map(a => ({
        id: a.id,
        src: 'fs',
        title: a.title || '(제목 없음)',
        cat: a.cat || a.category || '',
        views: Number(a.viewCount) || 0,
        likes: likeCount(a)
      })),
      ...legacyEntries.map(([id, a]) => ({
        id,
        src: 'static',
        title: a.title || '(제목 없음)',
        cat: a.cat || '',
        views: 0,
        likes: 0
      }))
    ];

    if (sortMode === 'likes') rows.sort((a, b) => b.likes - a.likes);
    else rows.sort((a, b) => b.views - a.views);

    const tbody = document.getElementById('engagementTable');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="3" class="admin-empty">콘텐츠가 없습니다.</td></tr>`;
      return;
    }

    const dim = (n) => n > 0 ? String(fmtNum(n)) : '<span style="color:var(--muted);">—</span>';
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>
          <a href="/articles/${r.id}.html" target="_blank" class="title-cell">${adminEscHTML(r.title)}</a>
          <span class="title-cell-sub">${adminEscHTML(r.cat)}${r.src === 'static' ? ' · <span class="admin-tag static-tag">정적</span>' : ''}</span>
        </td>
        <td style="text-align:right;">${dim(r.views)}</td>
        <td style="text-align:right;">${dim(r.likes)}</td>
      </tr>
    `).join('');
  }

  // Sort buttons
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sortMode = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  // Subscribe to Firestore once auth is ready
  fb.authReady.then(user => {
    if (!user || !fb.isAdmin()) return;
    fb.db.collection('articles').onSnapshot(snap => {
      articlesList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      articlesReady = true;
      render();
    }, err => { console.warn('[stats] articles snapshot error:', err); });

    fb.db.collection('users').onSnapshot(snap => {
      usersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      usersReady = true;
      render();
    }, err => { console.warn('[stats] users snapshot error:', err); });
  });

  // Initial render (shows '—' until data arrives — also seeds the table with static articles)
  render();
</script>
</body>
</html>
