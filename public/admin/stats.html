<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script>
  (function syncLogos() {
    const dark = document.body.classList.contains('dark');
    document.querySelectorAll('.brand-logo-light').forEach(l => l.style.display = dark ? 'none' : 'inline-block');
    document.querySelectorAll('.brand-logo-dark').forEach(l => l.style.display = dark ? 'inline-block' : 'none');
  })();
  document.getElementById('adminWho').textContent = adminEmail();

  // ===== State =====
  let articlesList = [];   // Firestore articles
  let usersList = [];      // Firestore users
  let inquiriesList = [];  // Firestore inquiries (추이용)
  let trendPeriod = 'week';
  let sortMode = 'views';  // 'views' | 'likes'
  let articlesReady = false;
  let usersReady = false;

  // Helper — reaction counts (supports either reactionCounts.{new,deep,pass} or reactions{*-new,*-deep,*-pass})
  // 좋아요 수. 현재 공개 사이트는 rcNew 필드를 ±1 한다.
  // 예전 데이터가 reactionCounts.new 나 reactions 맵에 들어간 경우도 함께 더한다.
  function likeCount(a) {
    let n = Number(a.rcNew || 0);
    const rc = a.reactionCounts || {};
    n += Number(rc.new || 0);
    const r = a.reactions;
    if (r && typeof r === 'object') {
      Object.entries(r).forEach(([k, v]) => {
        if (k.endsWith('-new')) n += Number(v) || 0;
      });
    }
    return n > 0 ? n : 0;
  }

  /* ===================== 추이 차트 =====================
     시각 정보가 남는 세 가지만 집계한다.
       신규 독자   users.createdAt
       발행 콘텐츠 articles.publishedAt (없으면 createdAt)
       문의 접수   inquiries.createdAt
     조회수·좋아요는 누적 카운터라 날짜별 이력이 없어 제외한다. */
  const TREND_SERIES = [
    { key: 'users',   label: '신규 독자',   color: 'var(--fg)' },
    { key: 'posts',   label: '발행 콘텐츠', color: '#9aa0a6' },
    { key: 'inquiry', label: '문의 접수',   color: '#2563eb' }
  ];
  const TREND_BUCKETS = { week: 12, month: 12, quarter: 8, year: 5 };

  function tsMs(v) {
    if (!v) return 0;
    if (typeof v.toDate === 'function') return v.toDate().getTime();
    if (typeof v.seconds === 'number') return v.seconds * 1000;
    if (typeof v === 'number') return v;
    if (typeof v === 'string') { const t = Date.parse(v); return isNaN(t) ? 0 : t; }
    return 0;
  }

  // 구간의 시작 시각으로 내림 — 주는 월요일 기준
  function bucketStart(d, period) {
    const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (period === 'week') {
      const dow = (x.getDay() + 6) % 7;      // 월=0
      x.setDate(x.getDate() - dow);
      return x;
    }
    if (period === 'month')   return new Date(x.getFullYear(), x.getMonth(), 1);
    if (period === 'quarter') return new Date(x.getFullYear(), Math.floor(x.getMonth() / 3) * 3, 1);
    return new Date(x.getFullYear(), 0, 1);
  }
  function bucketPrev(d, period, n) {
    const x = new Date(d);
    if (period === 'week')    { x.setDate(x.getDate() - 7 * n); return x; }
    if (period === 'month')   { x.setMonth(x.getMonth() - n); return x; }
    if (period === 'quarter') { x.setMonth(x.getMonth() - 3 * n); return x; }
    x.setFullYear(x.getFullYear() - n); return x;
  }
  function bucketLabel(d, period) {
    const p = n => String(n).padStart(2, '0');
    if (period === 'week')    return (d.getMonth() + 1) + '/' + d.getDate();
    if (period === 'month')   return String(d.getFullYear()).slice(2) + '.' + p(d.getMonth() + 1);
    if (period === 'quarter') return String(d.getFullYear()).slice(2) + ' Q' + (Math.floor(d.getMonth() / 3) + 1);
    return String(d.getFullYear());
  }

  function renderTrend() {
    const host = document.getElementById('trendChart');
    const legendEl = document.getElementById('trendLegend');
    if (!host) return;

    const period = trendPeriod;
    const count = TREND_BUCKETS[period];
    const now = new Date();
    // 최근 count개 구간(과거 -> 현재)
    const starts = [];
    for (let i = count - 1; i >= 0; i--) starts.push(bucketStart(bucketPrev(now, period, i), period));
    const edges = starts.map(d => d.getTime());
    const nextEdge = bucketStart(bucketPrev(now, period, -1), period).getTime();

    const buckets = starts.map((d, i) => ({
      start: d,
      label: bucketLabel(d, period),
      from: edges[i],
      to: (i + 1 < edges.length ? edges[i + 1] : nextEdge),
      users: 0, posts: 0, inquiry: 0
    }));
    const put = (ms, key) => {
      if (!ms) return;
      for (let i = 0; i < buckets.length; i++) {
        if (ms >= buckets[i].from && ms < buckets[i].to) { buckets[i][key]++; return; }
      }
    };
    usersList.forEach(u => put(tsMs(u.createdAt), 'users'));
    articlesList.filter(a => a.status === 'PUBLISHED')
      .forEach(a => put(tsMs(a.publishedAt || a.createdAt), 'posts'));
    inquiriesList.forEach(q => put(tsMs(q.createdAt), 'inquiry'));

    // 범례 — 합계와 직전 구간 대비 증감
    const totals = {}, last = buckets[buckets.length - 1] || {}, prev = buckets[buckets.length - 2] || {};
    TREND_SERIES.forEach(sr => { totals[sr.key] = buckets.reduce((n, b) => n + b[sr.key], 0); });
    legendEl.innerHTML = TREND_SERIES.map(sr => {
      const cur = last[sr.key] || 0, pv = prev[sr.key] || 0;
      const diff = cur - pv;
      const cls = diff > 0 ? 'up' : (diff < 0 ? 'down' : '');
      const sign = diff > 0 ? '+' : '';
      return '<span class="trend-leg"><i style="background:' + sr.color + '"></i>' + sr.label +
        ' <b>' + fmtNum(totals[sr.key]) + '</b>' +
        '<span class="trend-delta">(최근 구간 ' + fmtNum(cur) +
        (buckets.length > 1 ? ' <b class="' + cls + '">' + sign + diff + '</b>' : '') + ')</span></span>';
    }).join('');

    const max = Math.max(1, ...buckets.map(b => Math.max(b.users, b.posts, b.inquiry)));
    if (!buckets.some(b => b.users || b.posts || b.inquiry)) {
      host.innerHTML = '<div class="trend-empty">이 구간에 기록된 데이터가 없습니다.</div>';
      return;
    }

    // ---- SVG 막대 (외부 라이브러리 없이) ----
    const W = 760, H = 240, padL = 34, padR = 6, padT = 10, padB = 26;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const groupW = plotW / buckets.length;
    const barW = Math.max(3, Math.min(14, (groupW - 10) / TREND_SERIES.length));
    const y = v => padT + plotH - (v / max) * plotH;

    let svg = '<svg class="trend-svg" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="추이 그래프">';
    // 가로 눈금 4단
    for (let i = 0; i <= 4; i++) {
      const v = Math.round(max * i / 4);
      const yy = y(v);
      svg += '<line class="grid" x1="' + padL + '" y1="' + yy + '" x2="' + (W - padR) + '" y2="' + yy + '"/>';
      svg += '<text class="axis-t" x="' + (padL - 6) + '" y="' + (yy + 3) + '" text-anchor="end">' + v + '</text>';
    }
    buckets.forEach((b, gi) => {
      const gx = padL + groupW * gi;
      const totalBarsW = barW * TREND_SERIES.length + 2 * (TREND_SERIES.length - 1);
      const startX = gx + (groupW - totalBarsW) / 2;
      TREND_SERIES.forEach((sr, si) => {
        const v = b[sr.key];
        const bx = startX + si * (barW + 2);
        const by = y(v);
        const bh = Math.max(v > 0 ? 2 : 0, padT + plotH - by);
        if (bh > 0) {
          svg += '<rect class="bar" x="' + bx.toFixed(1) + '" y="' + by.toFixed(1) +
                 '" width="' + barW.toFixed(1) + '" height="' + bh.toFixed(1) +
                 '" fill="' + sr.color + '" rx="1.5">' +
                 '<title>' + b.label + ' · ' + sr.label + ' ' + v + '</title></rect>';
        }
      });
      svg += '<text class="axis-t" x="' + (gx + groupW / 2).toFixed(1) + '" y="' + (H - 8) +
             '" text-anchor="middle">' + b.label + '</text>';
    });
    svg += '</svg>';
    host.innerHTML = svg;
  }

  function render() {
    // ===== Top stat cards =====
    const totalUsers = usersList.length;
    const weekAgo = Date.now() - 7 * 86400 * 1000;
    const recentUsers = usersList.filter(u => {
      const c = u.createdAt;
      let t = 0;
      if (c && typeof c.toDate === 'function') t = c.toDate().getTime();
      else if (c && typeof c.seconds === 'number') t = c.seconds * 1000;
      else if (typeof c === 'string') t = new Date(c).getTime() || 0;
      else if (typeof c === 'number') t = c;
      return t >= weekAgo;
    }).length;

    const pubArticles = articlesList.filter(a => a.status === 'PUBLISHED');
    const legacyEntries = Object.entries(window.ARTICLES || {});
    const totalArticles = pubArticles.length + legacyEntries.length;
    const totalLikes = pubArticles.reduce((s, a) => s + likeCount(a), 0);

    const setVal = (id, v) => {
      const el = document.querySelector(`#${id} .admin-stat-value`);
      if (el) el.textContent = typeof v === 'number' ? fmtNum(v) : v;
    };
    // Until both subscriptions arrive, show '—' for the side that isn't loaded
    setVal('statTotalUsers', usersReady ? totalUsers : '—');
    setVal('statRecentUsers', usersReady ? recentUsers : '—');
    setVal('statTotalArticles', articlesReady ? totalArticles : '—');
    setVal('statTotalLikes', articlesReady ? totalLikes : '—');

    // ===== Engagement table =====
    const rows = [
      ...pubArticles.map(a => ({
        id: a.id,
        src: 'fs',
        title: a.title || '(제목 없음)',
        cat: a.cat || a.category || '',
        views: Number(a.viewCount) || 0,
        likes: likeCount(a)
      })),
      ...legacyEntries.map(([id, a]) => ({
        id,
        src: 'static',
        title: a.title || '(제목 없음)',
        cat: a.cat || '',
        views: 0,
        likes: 0
      }))
    ];

    renderTrend();

    if (sortMode === 'likes') rows.sort((a, b) => b.likes - a.likes);
    else rows.sort((a, b) => b.views - a.views);

    const tbody = document.getElementById('engagementTable');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="3" class="admin-empty">콘텐츠가 없습니다.</td></tr>`;
      return;
    }

    const dim = (n) => n > 0 ? String(fmtNum(n)) : '<span style="color:var(--muted);">—</span>';
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>
          <a href="/articles/${r.id}.html" target="_blank" class="title-cell">${adminEscHTML(r.title)}</a>
          <span class="title-cell-sub">${adminEscHTML(r.cat)}${r.src === 'static' ? ' · <span class="admin-tag static-tag">정적</span>' : ''}</span>
        </td>
        <td style="text-align:right;">${dim(r.views)}</td>
        <td style="text-align:right;">${dim(r.likes)}</td>
      </tr>
    `).join('');
  }

  // Sort buttons
  document.querySelectorAll('.trend-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      trendPeriod = btn.dataset.period;
      renderTrend();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sortMode = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  // Subscribe to Firestore once auth is ready
  fb.authReady.then(user => {
    if (!user || !fb.isAdmin()) return;
    fb.db.collection('articles').onSnapshot(snap => {
      articlesList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      articlesReady = true;
      render();
    }, err => { console.warn('[stats] articles snapshot error:', err); });

    fb.db.collection('inquiries').onSnapshot(snap => {
      inquiriesList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTrend();
    }, err => console.warn('[stats] 문의 구독 실패:', err.message));

    fb.db.collection('users').onSnapshot(snap => {
      usersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      usersReady = true;
      render();
    }, err => { console.warn('[stats] users snapshot error:', err); });
  });

  // Initial render (shows '—' until data arrives — also seeds the table with static articles)
  render();
</script>
