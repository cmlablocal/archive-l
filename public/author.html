<!-- ============== LOGIN MODAL ============== -->
<div class="login-modal" id="loginModal">

    <button class="login-close" id="loginCloseBtn" aria-label="Close">

      <img src="/assets/img/white_logo.png" class="logo-white" alt="LOCAL LAYERS" />
    </div>
    <h2 class="login-title">로그인</h2>
    <p class="login-sub">Local Layers 독자가 되면<br/>모든 아티클을 끝까지 읽을 수 있어요.</p>
    <form class="login-form" novalidate onsubmit="doAuth(); return false;">
      <input type="text" id="loginName" placeholder="이름" autocomplete="name" style="display:none" />
      <input type="email" id="loginEmail" placeholder="이메일" required autocomplete="email" />
      <input type="password" id="loginPassword" placeholder="비밀번호" required autocomplete="current-password" />
      <button type="submit" class="login-submit" id="loginSubmitBtn">로그인</button>
    </form>
    <div class="login-meta">
      <a href="#" onclick="openPasswordReset(); return false;">비밀번호 찾기</a>
      <span class="login-meta-sep">·</span>
      <a href="#" id="loginModeToggle" onclick="toggleLoginMode(); return false;">회원가입 →</a>
    </div>
  </div>
</div>
