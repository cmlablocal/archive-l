<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>archive L</title>
<meta name="description" content="archive L — 로컬 인스퍼레이션 아카이빙." />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo" aria-label="archive L"><img src="/img/logo.png" alt="archive L" /></a>
    <nav class="header-nav">
      <a href="/">Archive</a>
      <a href="/about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <div class="container">
    <article class="article">
      <div class="article-loc" id="aLoc"></div>
      <h1 class="article-title" id="aTitle">불러오는 중…</h1>
      <div class="article-meta" id="aMeta"></div>
      <div class="article-hero" id="aHero">archive</div>
      <p class="article-lead" id="aLead"></p>
      <div class="article-body" id="aBody"></div>
      <a class="article-back" href="/">← 아카이브로 돌아가기</a>
    </article>
  </div>
</main>

<div class="container">
  <footer class="footer">
    <span>© 2026 archive L</span>
    <span class="footer-brand">CM LAB : space &amp; experience</span>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/assets/js/firebase.js"></script>
<script src="/assets/js/data.js"></script>
<script>
(function () {
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function param(k) { return new URLSearchParams(location.search).get(k); }

  function render(d) {
    document.title = (d.title || 'archive L') + ' — archive L';
    document.getElementById('aLoc').textContent = d.locationName || '';
    document.getElementById('aTitle').textContent = d.title || '(제목 없음)';
    document.getElementById('aMeta').textContent = d.dateLabel || '';
    document.getElementById('aLead').textContent = d.lead || '';
    var body = Array.isArray(d.body) ? d.body : (d.body ? [d.body] : []);
    document.getElementById('aBody').innerHTML = body.map(function (p) {
      return '<p>' + esc(p) + '</p>';
    }).join('');
    if (d.thumb) {
      document.getElementById('aHero').innerHTML = '<img src="' + esc(d.thumb) + '" alt="" />';
    }
  }
  function notFound() {
    document.getElementById('aTitle').textContent = '찾을 수 없는 기록';
    document.getElementById('aHero').style.display = 'none';
    document.getElementById('aLead').textContent = '요청하신 항목을 찾지 못했습니다.';
  }

  var id = param('id');
  var samples = window.ARCHIVE_SAMPLES || {};

  if (id && samples[id]) { render(samples[id]); return; }     // 더미 샘플 우선
  if (id && window.fb && window.fb.db) {                        // Firestore 폴백
    window.fb.db.collection('items').doc(id).get()
      .then(function (s) { s.exists ? render(Object.assign({ id: s.id }, s.data())) : notFound(); })
      .catch(notFound);
    return;
  }
  notFound();
})();
</script>
</body>
</html>
